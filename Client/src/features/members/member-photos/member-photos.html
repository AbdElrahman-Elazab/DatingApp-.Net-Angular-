@if (!this.memberService.editMode()) {
  @if (photos()) {
    @if (photos().length > 0) {
      <div class="grid grid-cols-4 auto-rows-min gap-3 p-5 h-[65vh] overflow-auto">
        @for (photo of photos(); track photo.id) {
          <div class="relative">
            <img src="{{ photo.url }}" alt="photo of member" class="w-full rounded-lg" />

            @if (accountService.currentUser()?.id === memberService.member()?.id) {
              <app-star-button
                (clickEvent)="setMainPhoto(photo)"
                [selected]="photo.url == this.memberService.member()?.imageUrl"
                [disabled]="photo.url == this.memberService.member()?.imageUrl"
                class="absolute top-1 right-1"
              />

              <app-delete-button
                (clickEvent)="deletePhoto(photo)"
                [disabled]="photo.url == this.memberService.member()?.imageUrl"
                class="absolute top-1 left-1"
              />
            }
            
          </div>
        }
      </div>
    } @else {
      <div class="text-center text-gray-500">No photo available</div>
    }
  }
} @else {
  <app-image-upload (upload)="onUploadPhoto($event)" [loading]="loading()" />
}
