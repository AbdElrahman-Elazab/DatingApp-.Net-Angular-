<div class="card bg-base-100 w-1/2 mx-auto flex flex-col p-6 rounded-lg shadow-lg">
  <div class="card-title justify-center text-xl text-primary">Sign up</div>
  <div class="card-body w-full">

    <ul class="steps">
      <li class="step step-primary">Credentials</li>
      <li class="step" [class.step-primary]="currentStep()===2">Profile</li>
    </ul>
    @if (currentStep() === 1) {
      <form [formGroup]="credentialsForm" class="flex flex-col gap-4 w-full ">
        <app-text-input lable="Email" formControlName="email" />
        <app-text-input lable="Display Name" formControlName="displayName" />
        <app-text-input lable="password" formControlName="password" type="password" />
        <app-text-input
          lable="Confirm Password"
          formControlName="confirmPassword"
          type="password"
        />
        <div class="flex items-center justify-end gap-3">
          <button class="btn" (click)="cancel()">Cancel</button>
          <button
          class="btn btn-primary"
           [disabled]="!credentialsForm.valid"
            (click)="nextStep()">
            Next
          </button>
        </div>
      </form>
    }


    @if(currentStep()===2){
      <form [formGroup]="profileForm" class="flex flex-col gap-4 w-full " >

<div class="flex items-center gap-4">
    <div class="font-semibold">Gender: </div>
    <label class="flex gap-3 items-center">
        <span>Male</span>
        <input type="radio" formControlName="gender" value="male"
            class="radio radio-primary">
    </label>
    <label class="flex gap-3 items-center">
        <span>Female</span>
        <input type="radio" formControlName="gender" value="female"
            class="radio radio-primary">
    </label>
</div>

<app-text-input lable="Date Of Birth"  formControlName="dateOfBirth" type="date" [maxDate]="getMaxDate()" />
      <app-text-input lable="City"  formControlName="city"  />
      <app-text-input lable="Country Password"  formControlName="country"  />

      <div class="flex items-center justify-end gap-3">
        <button class="btn" (click)="prevStep()">Back</button>
        <button class="btn btn-primary" [disabled]="!credentialsForm.valid" (click)="register()">
          Register
        </button>
      </div>
    </form>
    }

    @if (validationErrors().length > 0) {
  <div class="mt-5 flex bg-gray-200 rounded-2xl w-1/2 p-3 mx-auto">
    <ul class="flex flex-col text-error space-y-1">
      @for (error of validationErrors(); track $index) {
        <li>{{error}}</li>
      }
    </ul>
  </div>
}

  </div>
</div>
